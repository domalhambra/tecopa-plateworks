name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # nightly full run (07:00 UTC) so the slow render tier, which PRs skip, still runs
    # against main every day even when no one pushes.
    - cron: "0 7 * * *"

permissions:
  contents: read

# a superseded push's run is wasted work -- cancel it when a newer one starts
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    # Under `pytest -n auto` the full suite is ~8-10 min (was ~30 serial) and the PR tier
    # less; keep headroom over the full run so a hang still can't run forever.
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"
          cache: "pip"
          cache-dependency-path: requirements-lock.txt

      # pandas/geopandas let the region-prep tests (bake_hydro, _trim_nan_edges) run
      # here -- they were skipped in EVERY environment before (red-team). They are
      # deliberately NOT in the lock: the app itself never imports them.
      - name: Install pinned dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-lock.txt
          pip install pandas geopandas
          # the share extra (imageio-ffmpeg) lets the mp4 film tests run here
          # instead of skipping. Like pandas/geopandas, deliberately NOT in the
          # lock: it bundles an ffmpeg binary the core app never needs.
          pip install -r requirements-share.txt

      # rasterio/pyproj/Pillow ship manylinux wheels (bundled GDAL/PROJ), so no apt
      # GDAL is needed. tests/conftest.py hydrates a synthetic DEM, so the
      # endpoint/render/registration suites run here instead of skipping.
      #
      # Two axes:
      #   -n auto     fan the run across every runner core (pytest-xdist).
      #   slow        heavy full-res render tests -> excluded from the fast PR tier.
      #   serial      mutate the shared regions/ tree -> must run alone (never under -n).
      #
      # A pull_request runs only the FAST, parallel-safe tier for minutes-fast feedback.
      # Pushes to main and the nightly schedule run EVERYTHING: the parallel bucket first,
      # then the serial bucket on its own. The job name stays "test" for both, so a
      # required-status-check named "test" needs no reconfiguration.
      - name: Run tests
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            python -m pytest -n auto -m "not slow and not serial"
          else
            python -m pytest -n auto -m "not serial"
            python -m pytest -m "serial"
          fi
