[pytest]
# Put the repo root on sys.path so `import app` / `import region_prep` resolve under a
# bare `pytest` invocation (CI), not just `python -m pytest` (which adds cwd itself).
pythonpath = .
testpaths = tests
# --durations surfaces the slowest tests in every run's log, so future slowness is
# diagnosed from the tail instead of re-profiled. --strict-markers turns a typo'd
# marker (e.g. @pytest.mark.slwo) into an error rather than a silently-unfiltered test.
addopts = --durations=25 --strict-markers
markers =
    slow: end-to-end render tests (full-res finals, films, wallpaper bundles, mockups).
          Excluded from the fast PR tier (`-m "not slow"`); the full suite still runs on
          main and nightly. Marker lives on whole render-heavy modules via `pytestmark`.
    serial: mutates a shared on-disk resource (e.g. the regions/ tree) and MUST NOT run
            alongside other tests. CI runs `-m "not serial"` in parallel, then `-m serial`
            on its own. Keep this set tiny — it is a bottleneck by construction.
